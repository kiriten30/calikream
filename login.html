<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Log In — CALIKREAM</title>
  
  <!-- Preload fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <!-- Styles -->
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <main class="auth-page">
    <div class="auth-page__glow"></div>
    
    <div class="auth-card">
      <div class="auth-card__header">
        <a href="index.html" class="auth-card__logo">CALI<span>KREAM</span></a>
        <h1 style="font-size: 24px; margin-bottom: 8px;">Welcome Back.</h1>
        <p class="auth-card__subtitle">Enter your details to access your training programs.</p>
      </div>

      <form class="auth-form" id="loginForm">
        <div id="loginError" style="color: #FF0055; font-size: 14px; display: none; margin-bottom: 8px;"></div>
        <div class="form-group">
          <input type="email" id="emailInput" class="form-input" placeholder="Email address" required>
        </div>
        
        <div class="form-group">
          <input type="password" id="passwordInput" class="form-input" placeholder="Password" required>
        </div>

        <div class="form-options">
          <label>
            <input type="checkbox"> Remember me
          </label>
          <a href="#" class="form-link">Forgot Password?</a>
        </div>

        <button type="submit" class="btn btn--primary auth-submit">Log In <span class="btn-arrow">→</span></button>
      </form>

      <div class="auth-divider">Or continue with</div>

      <div class="auth-social">
        <button class="btn-social" id="btnGoogleLogin">
          <svg viewBox="0 0 24 24"><path fill="currentColor" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="currentColor" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="currentColor" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="currentColor" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
          Google
        </button>
        <button class="btn-social">
          <svg viewBox="0 0 24 24"><path fill="currentColor" d="M17.05 20.28c-.98.95-2.05.88-3.08.4-1.09-.5-2.08-.48-3.24 0-1.44.62-2.2.44-3.06-.35C2.79 15.25 3.51 7.59 9.05 7.31c1.35.07 2.29.74 3.08.74.83 0 1.95-.83 3.46-.71 1.54.12 2.76.77 3.55 1.94-3.16 1.83-2.61 5.86.3 7.04-.68 1.67-1.52 3.12-2.39 3.96zM12.03 7.25c-.15-2.23 1.66-4.07 3.74-4.25.29 2.58-2.34 4.5-3.74 4.25z"/></svg>
          Apple
        </button>
      </div>

      <div class="auth-footer">
        Don't have an account? <a href="signup.html" class="form-link">Sign Up</a>
      </div>
    </div>
  </main>

  <script type="module">
    import { logInUser, logInWithProvider } from '/src/js/auth.js';

    // Handle Email/Password Login
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const email = document.getElementById('emailInput').value;
      const password = document.getElementById('passwordInput').value;
      const errorDisplay = document.getElementById('loginError');
      const submitBtn = e.target.querySelector('button[type="submit"]');
      
      // Basic loading state
      const originalText = submitBtn.innerHTML;
      submitBtn.innerHTML = 'Logging in...';
      submitBtn.disabled = true;
      errorDisplay.style.display = 'none';

      const { data, error } = await logInUser(email, password);

      if (error) {
        // Reset button and show error
        submitBtn.innerHTML = originalText;
        submitBtn.disabled = false;
        errorDisplay.textContent = error.message;
        errorDisplay.style.display = 'block';
      } else {
        // Success! Redirect to home
        window.location.href = '/index.html';
      }
    });

    // Handle OAuth Logins
    document.getElementById('btnGoogleLogin').addEventListener('click', () => {
      logInWithProvider('google');
    });

    document.getElementById('btnAppleLogin').addEventListener('click', () => {
      logInWithProvider('apple');
    });
  </script>
</body>
</html>
